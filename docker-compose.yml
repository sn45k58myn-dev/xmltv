services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: xmltv
      POSTGRES_USER: xmltv
      POSTGRES_PASSWORD: xmltv
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xmltv -d xmltv"]
      interval: 10s
      timeout: 5s
      retries: 5

  xmltv:
    build: .
    restart: unless-stopped
    init: true
    depends_on:
      postgres:
        condition: service_healthy
      webgrab-setup:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://xmltv:xmltv@postgres:5432/xmltv?schema=public
      RUN_MIGRATIONS: "true"
      WEBGRAB_ENABLED: "true"
      WEBGRAB_COMMAND: "true"
      WEBGRAB_WORKDIR: /app/data/webgrab
      WEBGRAB_OUTPUT_FILE: guide.xml
      WEBGRAB_SOURCE_FILES: /app/data/webgrab/guide.xml
      WEBGRAB_REGISTER_SITEINI_SOURCES: "true"
      WEBGRAB_SITEINI_SOURCE_ENABLED: "true"
    volumes:
      - ./cache:/app/cache
      - ./data:/app/data
      - ./webgrab/config:/app/webgrab/config:ro
      - ./webgrab/data:/app/data/webgrab:ro
      - ./uploads:/app/uploads
      - ./backups:/app/backups
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  webgrab-setup:
    build: .
    restart: "no"
    init: true
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://xmltv:xmltv@postgres:5432/xmltv?schema=public
      RUN_MIGRATIONS: "false"
      WEBGRAB_CONFIG_DIR: /app/webgrab/config
      WEBGRAB_CONFIG_OUTPUT_FILE: /data/webgrab/guide.xml
      WEBGRAB_WORKDIR: /app/data/webgrab
      WEBGRAB_OUTPUT_FILE: guide.xml
      WEBGRAB_SOURCE_FILES: /app/data/webgrab/guide.xml
      WEBGRAB_REGISTER_SITEINI_SOURCES: "true"
      WEBGRAB_SITEINI_SOURCE_ENABLED: "true"
    volumes:
      - ./webgrab/config:/app/webgrab/config
      - ./webgrab/data:/app/data/webgrab
    command: ["npm", "run", "webgrab:setup-stack"]

  webgrabplus:
    image: lscr.io/linuxserver/webgrabplus:latest
    container_name: xmltv-webgrabplus
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: UTC
    volumes:
      - ./webgrab/config:/config
      - ./webgrab/data:/data/webgrab
    depends_on:
      webgrab-setup:
        condition: service_completed_successfully

volumes:
  postgres-data:
