services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xmltv
      POSTGRES_USER: xmltv
      POSTGRES_PASSWORD: xmltv
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xmltv -d xmltv"]
      interval: 10s
      timeout: 5s
      retries: 5

  xmltv:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://xmltv:xmltv@postgres:5432/xmltv?schema=public
    volumes:
      - ./cache:/app/cache
      - ./data:/app/data
      - ./uploads:/app/uploads

volumes:
  postgres-data:
