services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xmltv
      POSTGRES_USER: xmltv
      POSTGRES_PASSWORD: xmltv
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  xmltv:
    build: .
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://xmltv:xmltv@postgres:5432/xmltv?schema=public
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./prisma:/app/prisma

volumes:
  postgres-data:
