name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://xmltv:xmltv@localhost:5432/xmltv?schema=public
      ADMIN_TOKEN: ci-admin-token
      PUBLIC_EXPORTS: "true"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: xmltv
          POSTGRES_USER: xmltv
          POSTGRES_PASSWORD: xmltv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xmltv -d xmltv"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      - run: npm run smoke:import
      - run: npm audit --audit-level=moderate
