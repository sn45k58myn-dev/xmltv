name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://xmltv:xmltv@localhost:5432/xmltv?schema=public
      ADMIN_TOKEN: ci-admin-token
      PUBLIC_EXPORTS: "true"
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: xmltv
          POSTGRES_USER: xmltv
          POSTGRES_PASSWORD: xmltv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xmltv -d xmltv"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Deploy migrations
        run: npx prisma migrate deploy

      - name: Verify migrations on fresh schema
        env:
          DATABASE_URL: postgresql://xmltv:xmltv@localhost:5432/xmltv?schema=fresh_migrate_deploy
        run: npx prisma migrate deploy

      - name: Verify
        run: npm run verify

      - name: Smoke import
        run: npm run smoke:import

      - name: Install PostgreSQL client tools
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Verify backup restore workflow
        env:
          BACKUP_DIR: backups-ci
          PGPASSWORD: xmltv
          VERIFY_DATABASE_URL: postgresql://xmltv:xmltv@localhost:5432/xmltv_restore_check?schema=public
        run: |
          set -e
          npm run backup:db
          latest="$(ls -1t backups-ci/xmltv-*.dump | head -1)"
          dropdb -h localhost -U xmltv --if-exists xmltv_restore_check
          createdb -h localhost -U xmltv xmltv_restore_check
          trap 'dropdb -h localhost -U xmltv --if-exists xmltv_restore_check' EXIT
          npm run backup:verify -- "$latest"

      - name: Audit moderate vulnerabilities
        run: npm audit --audit-level=moderate

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Write smoke-test env
        run: |
          cat > .env <<'EOF'
          NODE_ENV=production
          PORT=3000
          BASE_URL=http://localhost:3000
          ADMIN_TOKEN=ci-production-admin-token
          PUBLIC_EXPORTS=true
          CORS_ORIGIN=*
          ENABLE_SCHEDULER=false
          ENABLE_WORKER=false
          RUN_MIGRATIONS=true
          EOF

      - name: Validate Compose file
        run: docker compose config

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: xmltv-aggregator:ci

      - name: Boot production compose stack
        run: docker compose up --build -d

      - name: Smoke production endpoints
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS http://localhost:3000/health >/dev/null; then
              break
            fi
            sleep 2
          done

          curl -fsS http://localhost:3000/health
          curl -fsS http://localhost:3000/ready
          curl -fsS http://localhost:3000/manifest.json
          curl -fsS http://localhost:3000/monitoring/prometheus | grep '^xmltv_up 1'

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Stop compose stack
        if: always()
        run: docker compose down -v
